# External VM service test — exposes a non-k8s service through Traefik + ExternalDNS.
#
# Pattern: Service (no selector) + Endpoints pointing at a VM IP.
# Traefik treats it as a normal backend; ExternalDNS creates the DNS record.
#
# Replace 10.0.0.5 and 8788 with your VM's IP and port.
# Replace myapp.yourdomain.com with the desired hostname.
apiVersion: v1
kind: Service
metadata:
  name: myapp-external
spec:
  ports:
    - port: 80
      targetPort: 8788
---
apiVersion: v1
kind: Endpoints
metadata:
  name: myapp-external  # must match Service name exactly
subsets:
  - addresses:
      - ip: 10.0.0.5
    ports:
      - port: 8788
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-external-ingress
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-dns-issuer
    external-dns.alpha.kubernetes.io/hostname: myapp.yourdomain.com
    external-dns.alpha.kubernetes.io/target: <ddns-hostname>
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  ingressClassName: traefik
  rules:
  - host: myapp.yourdomain.com
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: myapp-external
            port:
              number: 80
  tls:
  - hosts:
    - myapp.yourdomain.com
    secretName: myapp-external-tls